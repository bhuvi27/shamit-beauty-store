name: Deploy GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'Override NEXT_PUBLIC_API_URL (e.g. http://EC2_IP:3000/api/v1 for AWS learning)'
        required: false
        type: string
        default: ''

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static site
        working-directory: web
        env:
          GITHUB_PAGES: 'true'
          GITHUB_REPOSITORY: ${{ github.repository }}
          # Manual run: optional api_url input. Push: repo variable or Render default.
          NEXT_PUBLIC_API_URL: ${{ github.event_name == 'workflow_dispatch' && inputs.api_url != '' && inputs.api_url || vars.NEXT_PUBLIC_API_URL || 'https://beauty-store-api.onrender.com/api/v1' }}
        run: npm run build

      - name: Add .nojekyll
        run: touch web/out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
