# Render Blueprint — free tier API (connect GitHub repo in Render dashboard)
services:
  - type: web
    name: beauty-store-api
    runtime: python
    plan: free
    rootDir: apps/api
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/live
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beauty-store-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: beauty-store-redis
          property: connectionString
      - key: MONGODB_URI
        sync: false
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        value: https://bhuvi27.github.io
      - key: PYTHON_VERSION
        value: "3.12.0"

  - type: pserv
    name: beauty-store-redis
    runtime: redis
    plan: free
    maxmemoryPolicy: allkeys-lru

databases:
  - name: beauty-store-db
    plan: free
    databaseName: beauty_store
    user: beauty
